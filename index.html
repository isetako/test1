<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ランダムポケモン</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="app" class="app">
    <p class="hint" id="hint">クリックしてポケモンを表示</p>

    <div class="card hidden" id="card">
      <div class="card-header">
        <span class="pokemon-id" id="pokemonId"></span>
        <div class="types" id="types"></div>
      </div>
      <img class="sprite" id="sprite" alt="" />
      <h1 class="pokemon-name" id="pokemonName"></h1>
      <div class="stats" id="stats"></div>
      <div class="meta" id="meta"></div>
    </div>

    <div class="loader hidden" id="loader">
      <div class="pokeball">
        <div class="pokeball-top"></div>
        <div class="pokeball-middle"></div>
        <div class="pokeball-bottom"></div>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
